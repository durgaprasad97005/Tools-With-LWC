<template>
    <div class="slds-p-around_small slds-theme_default">
        <div class="slds-grid slds-grid_vertical-align-center">
            <lightning-icon 
              icon-name="utility:lock" 
              alternative-text="Lock" 
              size="small"
            ></lightning-icon>

            <h1>Password Field</h1>
        </div>

        <div class="slds-m-vertical_large">
            <p>Enter Password</p>
            <div class="slds-grid slds-align_absolute-center">
                <div class="input-container slds-grid slds-grow">
                    <input type={inputType} 
                        class="slds-grow" 
                        onchange={handleChange} 
                        value={password} 
                    />

                    <lightning-icon 
                        class="slds-var-m-right_xx-small"
                        icon-name={iconName}
                        alternative-text="Preview" 
                        size="small"
                        onclick={toggleIcon}
                    ></lightning-icon>
                </div>

                <div class="slds-size_1-of-3">
                    <lightning-button-icon
                        icon-name="utility:copy_to_clipboard"
                        alternative-text="Copy"
                        size="large"
                        variant="bare"
                        onclick={copyTheContent}
                    ></lightning-button-icon>
                </div>
            </div>
            <p class={hide} style="color:green;">Copied!</p>
        </div>
    </div>
</template>
