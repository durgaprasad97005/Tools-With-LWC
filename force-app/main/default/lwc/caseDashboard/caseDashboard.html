<template>
    <lightning-card title="Case Dashboard" icon-name="standard:case">
        <div class="slds-grid slds-wrap slds-gutters slds-p-horizontal_medium">
            <template for:each={tiles} for:item="tile">
                <c-tile 
                    class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_4-of-12 slds-m-vertical_small"
                    key={tile.id} 
                    heading={tile.heading} 
                    count={tile.count} 
                    background-color={tile.backgroundColor}
                    color={tile.color}
                ></c-tile>
            </template>

            <div class="slds-col slds-p-around_small slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_4-of-12">
                <div class="slds-box cases-by-origin">
                    <p class="slds-text-heading_medium">
                        <b>Cases by Origin</b>
                    </p>
                    
                    <div class="table">
                        <lightning-datatable
                            key-field="Origin"
                            data={tableData}
                            columns={columns}
                            hide-checkbox-column
                        ></lightning-datatable>
                    </div>
                    
                </div>
            </div>
        </div>
    </lightning-card>
</template>
